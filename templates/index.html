<!doctype html>
<html>
  <head>
    <title>OTP Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-4">
      <div class="card shadow">
        <div class="card-header">
          <div class="d-flex justify-content-between">
            <h3>OTP Dashboard</h3>

            <button class="btn btn-success" onclick="startOTP()">
              Start OTP Monitor
            </button>
          </div>
        </div>

        <div class="card-body">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>OTP</th>
                <th>Source</th>
                <th>Received Time</th>
              </tr>
            </thead>

            <tbody id="otpTable"></tbody>
          </table>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <div class="card border-primary">
              <div class="card-body text-center">
                <h6>Total OTPs</h6>
                <h2 id="totalOtpCount">0</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-success">
              <div class="card-body text-center">
                <h6>Latest OTP</h6>
                <h2 id="latestOtp">-</h2>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-warning">
              <div class="card-body text-center">
                <h6>Last Received</h6>
                <h6 id="latestTime">-</h6>
              </div>
            </div>
          </div>
        </div>
        <div class="card mt-4 shadow">
          <div class="card-header bg-dark text-white">Debug Console</div>

          <div class="card-body">
            <button class="btn btn-danger btn-sm mb-2" onclick="clearLogs()">
              Clear Logs
            </button>

            <pre
              id="debugLog"
              style="
                height: 300px;
                overflow: auto;
                background: #000;
                color: #00ff00;
                padding: 10px;
                font-size: 12px;
              "
            ></pre>
          </div>
        </div>
      </div>
    </div>
    <script>
      const debugBox = document.getElementById
        ? document.getElementById("debugLog")
        : null;

      function addLog(type, message) {
        const box = document.getElementById("debugLog");

        if (!box) return;

        const time = new Date().toLocaleTimeString();

        box.textContent += `[${time}] [${type}] ${message}\n`;

        box.scrollTop = box.scrollHeight;
      }

      function clearLogs() {
        document.getElementById("debugLog").textContent = "";
      }

      const oldLog = console.log;
      console.log = function (...args) {
        addLog("LOG", args.join(" "));
        oldLog.apply(console, args);
      };

      const oldError = console.error;
      console.error = function (...args) {
        addLog("ERROR", args.join(" "));
        oldError.apply(console, args);
      };

      const oldWarn = console.warn;
      console.warn = function (...args) {
        addLog("WARN", args.join(" "));
        oldWarn.apply(console, args);
      };

      window.onerror = function (message, source, line, col, error) {
        addLog(
          "JS ERROR",
          `${message}
         (${source}:${line}:${col})`,
        );
      };

      window.addEventListener("unhandledrejection", function (event) {
        addLog("PROMISE ERROR", event.reason);
      });

      addLog("SYSTEM", "Debug console initialized");

      addLog("SYSTEM", "OTPCredential = " + typeof window.OTPCredential);

      addLog("SYSTEM", "isSecureContext = " + window.isSecureContext);
    </script>
    <script src="/static/js/otp.js"></script>
  </body>
</html>
